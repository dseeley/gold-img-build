    iso_checksum: "none"
  ubuntu1804:   #NOTE: Cannot use the 'live-server' version for 18.04, as this only provides subiquity *without* autoinstall
    name: "ubuntu1804"
    iso_url: "http://cdimage.ubuntu.com/releases/18.04/release/ubuntu-18.04.6-server-amd64.iso"
    iso_checksum: "none"
  ubuntu2004_legacy:
    name: "ubuntu2004l"
    iso_url: "http://cdimage.ubuntu.com/cdimage/ubuntu-legacy-server/releases/20.04/release/ubuntu-20.04.1-legacy-server-amd64.iso"
    iso_checksum: "none"
  ubuntu2004:
    name: "ubuntu2004"
    iso_url: "https://releases.ubuntu.com/20.04/ubuntu-20.04.6-live-server-amd64.iso"
    iso_checksum: "none"
  ubuntu2204:
    name: "ubuntu2204"
    iso_url: "https://releases.ubuntu.com/22.04/ubuntu-22.04.5-live-server-amd64.iso"
    iso_checksum: "none"
  ubuntu2404:
    name: "ubuntu2404"
    iso_url: "https://releases.ubuntu.com/24.04/ubuntu-24.04.3-live-server-amd64.iso"
    iso_checksum: "none"
  ubuntu2604:
    name: "ubuntu2604"
#    iso_url: "https://releases.ubuntu.com/26.04-snapshot1/ubuntu-26.04-live-server-amd64.iso"
#    iso_url: "https://cdimage.ubuntu.com/releases/26.04/ubuntu-26.04-snapshot4-live-server-amd64.iso"
    iso_url: "https://cdimage.ubuntu.com/ubuntu-server/daily-live/current/resolute-live-server-amd64.iso"
    iso_checksum: "none"


packer_pkg_url: "https://releases.hashicorp.com/packer/1.14.3/packer_1.14.3_linux_amd64.zip"

image_config:
  disk_size_mb: "12288"
  memory_mb: "2048"
  cpus: "2"
  swapfile_mb: 0
  remove_snapd: true
  systemd_debug: false     # Whether to debug systemd
  esxi:
    host: "192.168.1.31"
    username: "root"
    password: !vault |-
      $ANSIBLE_VAULT;1.1;AES256
      33333333333333333333333333333333333333333333333
    datastore: "vdisks"
    ethernet0_networkName: "VM Network"
    # ethernet0_macAddress: "00:0c:29:f2:dc:da"
    firmware: "efi"
    hw_version: 19
    plugin: "github.com/hashicorp/vmware"
  libvirt:
    host: "192.168.1.3"
    username: "svc"
    private_key: !vault |-
      $ANSIBLE_VAULT;1.1;AES256
      33333333333333333333333333333333333333333333333
    firmware: "efi"
    fileformat: "qcow2"
    storage_pool: "/media/vdisks"
    plugin: "github.com/hashicorp/qemu v1.1.1"
  xcp_ng:
    host: "192.168.1.71"
    username: "root"
    password: !vault |-
      $ANSIBLE_VAULT;1.1;AES256
      33333333333333333333333333333333333333333333333
    sr_name: "84gb-nvme"
    sr_iso_name: "LocalISO"
    firmware: "bios"
    network_names: "Network0"
    platform_args: {viridian: 'false', nx: 'true', pae: 'true', apic: 'true', timeoffset: '0', acpi: '1', cores-per-socket: '1'}
    plugin: "github.com/ddelnano/xenserver"
